<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC7 Contact Directory</title>
<link rel="manifest" href="/manifest_abc7.json">
<meta name="theme-color" content="#1b3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ABC7">
<link rel="apple-touch-icon" href="/icon_abc7_192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--card-bg:#ffffff;--text:#1a1a2e;--text-secondary:#5a5a7a;
  --accent:#1b3a5c;--accent-light:#2a5a8c;--accent-pale:#e8eef5;
  --border:#e2e6ec;--shadow:0 2px 12px rgba(27,58,92,0.06);
  --shadow-hover:0 6px 24px rgba(27,58,92,0.12);--radius:10px;
  --font:'Segoe UI','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.header{background:#ffffff;border-bottom:1px solid var(--border);padding:20px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);background:rgba(255,255,255,0.95)}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:40px;height:40px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;letter-spacing:1px}
.logo-text{font-size:20px;font-weight:600;color:var(--accent);letter-spacing:0.5px}
.logo-sub{font-size:12px;color:var(--text-secondary);letter-spacing:0.3px}
.search-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search-bar input{width:280px;padding:10px 16px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;background:#fff;transition:border-color 0.2s,box-shadow 0.2s;outline:none;font-family:var(--font)}
.search-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(27,58,92,0.1)}
.search-bar input::placeholder{color:#aab}
.stats{font-size:13px;color:var(--text-secondary);padding:4px 12px;background:var(--accent-pale);border-radius:20px;font-weight:500}
.container{max-width:1280px;margin:0 auto;padding:24px}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;padding:0 0 20px;border-bottom:1px solid var(--border)}
.filter-btn{padding:8px 18px;border:1.5px solid var(--border);border-radius:24px;background:#fff;color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all 0.2s;font-weight:500;font-family:var(--font);white-space:nowrap}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-pale)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
.card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:24px;transition:box-shadow 0.25s,transform 0.25s;cursor:pointer;display:flex;gap:18px;align-items:flex-start}
.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.card-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;background:var(--accent-pale);flex-shrink:0;border:2px solid var(--border)}
.card-photo-placeholder{width:72px;height:72px;border-radius:50%;background:var(--accent-pale);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--accent);font-weight:600;border:2px solid var(--border)}
.card-body{flex:1;min-width:0}
.card-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3}
.card-name-en{font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:400}
.card-position{font-size:13px;color:var(--accent);font-weight:500;margin-bottom:4px}
.card-company{font-size:13px;color:var(--text-secondary);margin-bottom:8px}
.card-meta{display:flex;flex-direction:column;gap:3px}
.card-meta-item{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;word-break:break-all}
.card-meta-icon{width:14px;height:14px;flex-shrink:0;opacity:0.5}
.card-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;background:var(--accent-pale);color:var(--accent);font-weight:500;margin-top:8px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:var(--accent-pale);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);transition:background 0.2s}
.modal-close:hover{background:var(--accent);color:#fff}
.modal-photo{width:100px;height:100px;border-radius:50%;object-fit:cover;margin:0 auto 20px;display:block;border:3px solid var(--accent-pale)}
.modal-name{text-align:center;font-size:22px;font-weight:600;margin-bottom:4px}
.modal-name-en{text-align:center;font-size:14px;color:var(--text-secondary);margin-bottom:4px}
.modal-nickname{text-align:center;font-size:13px;color:var(--accent);margin-bottom:20px}
.modal-section{margin-bottom:16px}
.modal-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:4px;font-weight:600}
.modal-value{font-size:14px;color:var(--text);line-height:1.5}
.modal-divider{height:1px;background:var(--border);margin:16px 0}
.no-results{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:16px}
@media(max-width:768px){
  .header-inner{flex-direction:column;align-items:stretch}
  .search-bar{flex-direction:column}
  .search-bar input{width:100%}
  .grid{grid-template-columns:1fr}
  .card{padding:18px}
  .container{padding:16px}
  .modal{padding:24px;margin:10px}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .card-photo,.card-photo-placeholder{width:56px;height:56px}
  .filters{gap:6px}
  .filter-btn{padding:6px 14px;font-size:12px}
}
/* Login Overlay */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1b3a5c 0%,#2c5aa0 100%);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:40px 32px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.login-box h1{font-size:22px;color:#1b3a5c;margin-bottom:6px}
.login-box p{font-size:13px;color:#888;margin-bottom:24px}
.login-box .login-icon{width:70px;height:70px;background:linear-gradient(135deg,#1b3a5c,#2d5a8c);border-radius:14px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff}
.login-box label{display:block;text-align:left;font-size:13px;color:#555;margin-bottom:6px;font-weight:600}
.login-box input{width:100%;padding:14px 16px;border:2px solid #dde;border-radius:10px;font-size:16px;outline:none;margin-bottom:14px}
.login-box input:focus{border-color:#1b3a5c}
.login-box .login-btn{width:100%;padding:14px;background:#1b3a5c;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:600;margin-top:8px}
.login-box .login-btn:hover{background:#2d5a8c}
.login-box .login-error{color:#c33;background:#fee;padding:10px;border-radius:8px;margin-top:8px;font-size:13px;display:none}
.logout-btn-header{padding:8px 18px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.logout-btn-header:hover{background:#b91c1c}
.user-welcome{font-size:13px;color:var(--text-secondary);font-weight:500}
/* PWA Install */
.install-btn{padding:8px 16px;background:#0d9488;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;display:none;white-space:nowrap}
.install-btn:hover{background:#0a7a6e}
.install-banner{display:none;background:linear-gradient(135deg,#1b3a5c,#2c5aa0);color:#fff;padding:14px 20px;text-align:center;position:fixed;bottom:0;left:0;right:0;z-index:8888;box-shadow:0 -4px 20px rgba(0,0,0,.2)}
.install-banner p{margin:0 0 10px;font-size:14px}
.install-banner button{padding:10px 24px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;margin:0 6px}
.install-banner .ib-install{background:#fff;color:#1b3a5c}
.install-banner .ib-close{background:rgba(255,255,255,.2);color:#fff}
</style>
</head>

const CATEGORIES = [{"id": "01", "name": "Berlin"}, {"id": "02", "name": "London"}, {"id": "03", "name": "Moscow"}, {"id": "04", "name": "New York"}, {"id": "05", "name": "Paris"}, {"id": "06", "name": "Rome"}, {"id": "07", "name": "Seoul"}, {"id": "08", "name": "Shanghai"}, {"id": "09", "name": "Sydney"}, {"id": "10", "name": "Tokyo"}];
const IMG_PATH = "image_ndc57_abc7/abc7/";

let activeFilter = null;
let searchTerm = "";

const catMap = {};
CATEGORIES.forEach(c => catMap[c.id] = c.name);

function init() {
  renderFilters();
  renderCards();
  document.getElementById("searchInput").addEventListener("input", e => {
    searchTerm = e.target.value.toLowerCase();
    renderCards();
  });
  document.getElementById("modalOverlay").addEventListener("click", e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
  });
}

function renderFilters() {
  const el = document.getElementById("filters");
  let html = '<button class="filter-btn active" onclick="setFilter(null)">ทั้งหมด</button>';
  CATEGORIES.forEach(c => {
    const count = CONTACTS.filter(ct => ct.group_id === c.id).length;
    html += `<button class="filter-btn" data-id="${c.id}" onclick="setFilter('${c.id}')">${c.name} (${count})</button>`;
  });
  el.innerHTML = html;
}

function setFilter(id) {
  activeFilter = id;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", id === null ? !b.dataset.id : b.dataset.id === id);
  });
  renderCards();
}

function renderCards() {
  let filtered = CONTACTS;
  if (activeFilter) filtered = filtered.filter(c => c.group_id === activeFilter);
  if (searchTerm) {
    filtered = filtered.filter(c => {
      const s = [c.tname,c.ename,c.nickname,c.position,c.company,c.email,c.mobile1].filter(Boolean).join(" ").toLowerCase();
      return s.includes(searchTerm);
    });
  }
  document.getElementById("stats").textContent = filtered.length + " contacts";
  const grid = document.getElementById("grid");
  const noR = document.getElementById("noResults");
  if (!filtered.length) {
    grid.innerHTML = "";
    noR.style.display = "block";
    return;
  }
  noR.style.display = "none";
  grid.innerHTML = filtered.map(c => {
    const initials = (c.nickname || c.tname || "?").charAt(0);
    const photoHtml = c.photo
      ? `<img class="card-photo" src="${IMG_PATH}${c.photo}" alt="" onerror="this.outerHTML='<div class=card-photo-placeholder>${initials}</div>'">`
      : `<div class="card-photo-placeholder">${initials}</div>`;
    return `<div class="card" onclick='openModal(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      ${photoHtml}
      <div class="card-body">
        <div class="card-name">${c.prefix||""} ${c.tname||""}</div>
        <div class="card-name-en">${c.ename||""}</div>
        <div class="card-position">${c.position||""}</div>
        <div class="card-company">${c.company||""}</div>
        <div class="card-meta">
          ${c.mobile1 ? `<a href="tel:${c.mobile1.replace(/[^0-9+]/g,'')}" class="card-meta-item" onclick="event.stopPropagation()" style="text-decoration:none;color:inherit"><svg class="card-meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>${c.mobile1}</a>` : ""}
          ${c.email ? `<a href="mailto:${c.email.split(',')[0]}" class="card-meta-item" onclick="event.stopPropagation()" style="text-decoration:none;color:inherit"><svg class="card-meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${c.email.split(",")[0]}</a>` : ""}
        </div>
        <span class="card-tag">${catMap[c.group_id]||""}</span>
      </div>
    </div>`;
  }).join("");
}

function openModal(c) {
  const m = document.getElementById("modal");
  const initials = (c.nickname || c.tname || "?").charAt(0);
  const photoHtml = c.photo
    ? `<img class="modal-photo" src="${IMG_PATH}${c.photo}" alt="" onerror="this.style.display='none'">`
    : "";
  const bday = [c.hbd_day, c.hbd_month, c.hbd_year].filter(Boolean).join("/");
  m.innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    ${photoHtml}
    <div class="modal-name">${c.prefix||""} ${c.tname||""}</div>
    <div class="modal-name-en">${c.ename||""}</div>
    <div class="modal-nickname">${c.nickname ? "ชื่อเล่น: "+c.nickname : ""}</div>
    <div class="modal-divider"></div>
    ${c.position ? `<div class="modal-section"><div class="modal-label">ตำแหน่ง</div><div class="modal-value">${c.position}</div></div>` : ""}
    ${c.company ? `<div class="modal-section"><div class="modal-label">บริษัท / องค์กร</div><div class="modal-value">${c.company}</div></div>` : ""}
    ${c.address ? `<div class="modal-section"><div class="modal-label">ที่อยู่</div><div class="modal-value">${c.address}</div></div>` : ""}
    <div class="modal-divider"></div>
    ${c.mobile1 ? `<div class="modal-section"><div class="modal-label">มือถือ</div><div class="modal-value"><a href="tel:${c.mobile1.replace(/[^0-9+]/g,'')}" style="color:var(--accent);text-decoration:none">${c.mobile1}</a></div></div>` : ""}
    ${c.mobile2 ? `<div class="modal-section"><div class="modal-label">มือถือ 2</div><div class="modal-value"><a href="tel:${c.mobile2.replace(/[^0-9+]/g,'')}" style="color:var(--accent);text-decoration:none">${c.mobile2}</a></div></div>` : ""}
    ${c.tel ? `<div class="modal-section"><div class="modal-label">โทรศัพท์</div><div class="modal-value"><a href="tel:${c.tel.replace(/[^0-9+]/g,'')}" style="color:var(--accent);text-decoration:none">${c.tel}</a></div></div>` : ""}
    ${c.fax ? `<div class="modal-section"><div class="modal-label">แฟกซ์</div><div class="modal-value">${c.fax}</div></div>` : ""}
    ${c.email ? `<div class="modal-section"><div class="modal-label">อีเมล</div><div class="modal-value">${c.email.split(",").map(e => `<a href="mailto:${e.trim()}" style="color:var(--accent);text-decoration:none">${e.trim()}</a>`).join(", ")}</div></div>` : ""}
    ${bday ? `<div class="modal-divider"></div><div class="modal-section"><div class="modal-label">วันเกิด</div><div class="modal-value">${bday}</div></div>` : ""}
    ${c.remark ? `<div class="modal-section"><div class="modal-label">หมายเหตุ</div><div class="modal-value">${c.remark}</div></div>` : ""}
    <div style="margin-top:12px"><span class="card-tag">${catMap[c.group_id]||""}</span></div>
  `;
  document.getElementById("modalOverlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("active");
  document.body.style.overflow = "";
}

// Build phone index from contacts
const PHONE_INDEX_FE = {};
CONTACTS.forEach(c => {
  if (c.mobile1) {
    const p = c.mobile1.replace(/\D/g, '');
    if (p) {
      if (!PHONE_INDEX_FE[p]) PHONE_INDEX_FE[p] = [];
      PHONE_INDEX_FE[p].push(c);
    }
  }
  if (c.mobile2) {
    const p = c.mobile2.replace(/\D/g, '');
    if (p) {
      if (!PHONE_INDEX_FE[p]) PHONE_INDEX_FE[p] = [];
      PHONE_INDEX_FE[p].push(c);
    }
  }
});

function doFrontendLogin() {
  const username = document.getElementById('loginUsername').value.replace(/\D/g, '');
  const password = document.getElementById('loginPassword').value.replace(/\D/g, '');
  const err = document.getElementById('loginError');
  err.style.display = 'none';

  if (!username || username.length < 9) {
    err.textContent = 'กรุณากรอก Username (เบอร์โทรศัพท์)';
    err.style.display = 'block';
    return;
  }
  if (!password) {
    err.textContent = 'กรุณากรอก Password';
    err.style.display = 'block';
    return;
  }
  if (username !== password) {
    err.textContent = 'Username หรือ Password ไม่ถูกต้อง';
    err.style.display = 'block';
    return;
  }

  const matches = PHONE_INDEX_FE[username];
  if (!matches || matches.length === 0) {
    err.textContent = 'ไม่พบเบอร์โทรศัพท์นี้ในระบบ';
    err.style.display = 'block';
    return;
  }

  // Save session
  sessionStorage.setItem('fe_user_abc7', JSON.stringify({phone: username, user: matches[0]}));

  // Hide login, show main content
  document.getElementById('loginOverlay').style.display = 'none';

  // Show welcome + logout
  const user = matches[0];
  document.getElementById('userWelcome').textContent = 'สวัสดี คุณ' + (user.nickname || user.tname);
  document.getElementById('userWelcome').style.display = '';
  document.getElementById('logoutBtn').style.display = '';

  // Initialize app then auto filter to user's group
  init();
  setFilter(user.group_id);
  // Show install prompt after login
  setTimeout(showInstallPromptAfterLogin, 800);
}

function doFrontendLogout() {
  sessionStorage.removeItem('fe_user_abc7');
  location.reload();
}

// Check session on load
function checkFrontendAuth() {
  const s = sessionStorage.getItem('fe_user_abc7');
  if (s) {
    try {
      const data = JSON.parse(s);
      if (data && data.user) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('userWelcome').textContent = 'สวัสดี คุณ' + (data.user.nickname || data.user.tname);
        document.getElementById('userWelcome').style.display = '';
        document.getElementById('logoutBtn').style.display = '';
        init();
        setFilter(data.user.group_id);
        // Show install prompt after session restore
        setTimeout(showInstallPromptAfterLogin, 800);
        return;
      }
    } catch(e) {}
  }
  // Show login overlay
  document.getElementById('loginOverlay').style.display = 'flex';
}

// Enter key support for login
document.getElementById('loginUsername').addEventListener('keypress', e => { if(e.key==='Enter') document.getElementById('loginPassword').focus(); });
document.getElementById('loginPassword').addEventListener('keypress', e => { if(e.key==='Enter') doFrontendLogin(); });

checkFrontendAuth();

// === PWA Install ===
let deferredPrompt = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw_abc7.js').catch(() => {});
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Only show if user is logged in (not behind login overlay)
  if (document.getElementById('loginOverlay').style.display === 'none') {
    document.getElementById('installBtnHeader').style.display = '';
    document.getElementById('installBanner').style.display = 'block';
  }
});

function triggerInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(result => {
      deferredPrompt = null;
      document.getElementById('installBtnHeader').style.display = 'none';
      document.getElementById('installBanner').style.display = 'none';
    });
  } else {
    showManualInstall();
  }
}

function showManualInstall() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isMac = /Macintosh/.test(navigator.userAgent);
  let msg = '';
  if (isIOS) {
    msg = 'วิธี Add to Home Screen บน iOS:\n\n1. กดปุ่ม Share (กล่องลูกศรขึ้น ⬆) ด้านล่างของ Safari\n2. เลื่อนลงแล้วกด "Add to Home Screen"\n3. กด "Add" มุมขวาบน';
  } else if (isMac) {
    msg = 'วิธี Add to Home Screen:\n\nSafari: กดเมนู File > Add to Dock\nChrome: กดจุด 3 จุดมุมขวาบน > Save and Share > Install App';
  } else {
    msg = 'วิธี Add to Home Screen:\n\nกดจุด 3 จุด (⋮) มุมขวาบนของ Browser\nแล้วเลือก "Add to Home screen" หรือ "Install App"';
  }
  alert(msg);
}

function closeInstallBanner() {
  document.getElementById('installBanner').style.display = 'none';
  sessionStorage.setItem('abc7_banner_closed', '1');
}

// Show install prompt after login for iOS/all platforms
function showInstallPromptAfterLogin() {
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isStandalone) return; // Already installed
  if (sessionStorage.getItem('abc7_banner_closed')) return; // User dismissed

  // For Chrome/Edge (has beforeinstallprompt)
  if (deferredPrompt) {
    document.getElementById('installBtnHeader').style.display = '';
    document.getElementById('installBanner').style.display = 'block';
    return;
  }

  // For iOS Safari / other browsers without beforeinstallprompt
  document.getElementById('installBtnHeader').style.display = '';
  document.getElementById('installBanner').style.display = 'block';
}
</script>

<!-- Install Banner -->
<div class="install-banner" id="installBanner">
  <p>เพิ่ม ABC7 Directory ลงหน้าจอหลักเพื่อเข้าถึงได้เร็วขึ้น</p>
  <button class="ib-install" onclick="triggerInstall()">Add to Home Screen</button>
  <button class="ib-close" onclick="closeInstallBanner()">ไม่ใช่ตอนนี้</button>
</div>
