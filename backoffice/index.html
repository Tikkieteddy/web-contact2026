<meta charset="UTF-8">

<title>Contact Directory - Backoffice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:linear-gradient(135deg,#1b3a5c 0%,#2d5a8c 100%);min-height:100vh;padding:20px}

/* Login */
#loginPage{max-width:400px;margin:80px auto;background:#fff;border-radius:16px;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
#loginPage h1{font-size:22px;color:#1b3a5c;margin-bottom:6px}
#loginPage p{font-size:13px;color:#888;margin-bottom:30px}
#loginPage .icon{width:70px;height:70px;background:linear-gradient(135deg,#1b3a5c,#2d5a8c);border-radius:14px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:34px}
#loginPage label{display:block;text-align:left;font-size:13px;color:#555;margin-bottom:8px;font-weight:600}
#loginPage input{width:100%;padding:14px 16px;border:2px solid #dde;border-radius:10px;font-size:18px;letter-spacing:1px;outline:none;text-align:center}
#loginPage input:focus{border-color:#1b3a5c}
#loginPage .btn{width:100%;padding:14px;background:#1b3a5c;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:20px;font-weight:600}
#loginPage .btn:hover{background:#2d5a8c}
#loginPage .error{color:#c33;background:#fee;padding:10px;border-radius:8px;margin-top:12px;font-size:13px;display:none}

/* Menu */
#menuPage{max-width:500px;margin:60px auto;text-align:center;display:none}
#menuPage .user-info{background:#fff;border-radius:16px;padding:30px;margin-bottom:24px;box-shadow:0 10px 40px rgba(0,0,0,.2)}
#menuPage .user-info h2{font-size:20px;color:#1b3a5c;margin-bottom:4px}
#menuPage .user-info p{color:#888;font-size:14px}
#menuPage .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
#menuPage .dir-card{background:#fff;border-radius:14px;padding:28px 20px;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.15);transition:transform .2s}
#menuPage .dir-card:hover{transform:translateY(-3px)}
#menuPage .dir-card h3{font-size:18px;margin-bottom:4px}
#menuPage .dir-card p{font-size:12px;color:#888}
#menuPage .dir-card.abc7 h3{color:#1b3a5c}
#menuPage .dir-card.ndc57 h3{color:#9a7b4f}
#menuPage .logout-btn{margin-top:20px;padding:10px 24px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;cursor:pointer;font-size:13px}
#menuPage .logout-btn:hover{background:rgba(255,255,255,.3)}

@media(max-width:480px){
  #loginPage{margin:40px auto;padding:32px 20px}
  #menuPage .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="icon">&#x1F4DE;</div>
  <h1>Contact Directory</h1>
  <p>Backoffice System</p>
  <label>เบอร์โทรศัพท์</label>
  <input type="tel" id="phoneInput" placeholder="เช่น 094-445-6396" autofocus>
  <div class="error" id="errorMsg"></div>
  <button class="btn" onclick="doLogin()">เข้าสู่ระบบ</button>
</div>

<!-- MENU PAGE -->
<div id="menuPage">
  <div class="user-info">
    <h2 id="userName"></h2>
    <p id="userDetail"></p>
  </div>
  <div class="cards" id="dirCards"></div>
  <button class="logout-btn" onclick="doLogout()">&#x0E2D;&#x0E2D;&#x0E01;&#x0E08;&#x0E32;&#x0E01;&#x0E23;&#x0E30;&#x0E1A;&#x0E1A;</button>
</div>

// Format phone as user types
document.getElementById('phoneInput').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  if (v.length > 10) v = v.slice(0, 10);
  if (v.length <= 3) e.target.value = v;
  else if (v.length <= 6) e.target.value = v.slice(0,3)+'-'+v.slice(3);
  else e.target.value = v.slice(0,3)+'-'+v.slice(3,6)+'-'+v.slice(6);
});

// Enter key
document.getElementById('phoneInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  var phone = document.getElementById('phoneInput').value.replace(/\D/g, '');
  var err = document.getElementById('errorMsg');
  err.style.display = 'none';

  if (!phone || phone.length < 9) {
    err.textContent = 'กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง';
    err.style.display = 'block';
    return;
  }

  var matches = PHONE_INDEX[phone];
  if (!matches || matches.length === 0) {
    err.textContent = 'ไม่พบหมายเลขโทรศัพท์นี้ในระบบ';
    err.style.display = 'block';
    return;
  }

  sessionStorage.setItem('backoffice_user', JSON.stringify({phone: phone, user: matches}));
  showMenu(matches);
}


function showMenu(matches) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('menuPage').style.display = 'block';

  var user = matches[0];
  document.getElementById('userName').textContent = '\u0e2a\u0e27\u0e31\u0e2a\u0e14\u0e35 \u0e04\u0e38\u0e13' + (user.nickname || user.tname);
  document.getElementById('userDetail').textContent = user.tname;

  // Build directory cards
  var byDir = {};
  matches.forEach(function(m) {
    if (!byDir[m.dir]) byDir[m.dir] = [];
    byDir[m.dir].push(m);
  });

  var cardsHtml = '';
  if (byDir.abc7) {
    var item = byDir.abc7[0];
    var gName = item.group_id === 'all' ? 'Admin' : (ABC7_GROUPS.find(function(g){return g.id===item.group_id}) || {}).name || item.group_id;
    cardsHtml += '<div class="dir-card abc7" onclick="goDir(\'abc7\',\''+item.group_id+'\',\''+item.nickname+'\')"><h3>ABC7 Directory</h3><p>'+(item.group_id==='all'?'Admin - \u0e14\u0e39\u0e44\u0e14\u0e49\u0e17\u0e38\u0e01\u0e01\u0e25\u0e38\u0e48\u0e21':'\u0e01\u0e25\u0e38\u0e48\u0e21: '+gName)+'</p></div>';
  }
  if (byDir.ndc57) {
    var item2 = byDir.ndc57[0];
    var gName2 = item2.group_id === 'all' ? 'Admin' : (NDC57_GROUPS.find(function(g){return g.id===item2.group_id}) || {}).name || item2.group_id;
    cardsHtml += '<div class="dir-card ndc57" onclick="goDir(\'ndc57\',\''+item2.group_id+'\',\''+item2.nickname+'\')"><h3>NDC57 Directory</h3><p>'+(item2.group_id==='all'?'Admin - \u0e14\u0e39\u0e44\u0e14\u0e49\u0e17\u0e38\u0e01\u0e01\u0e25\u0e38\u0e48\u0e21':'\u0e01\u0e25\u0e38\u0e48\u0e21: '+gName2)+'</p></div>';
  }

  // Add admin panel link for admin users
  var sessionPhone = JSON.parse(sessionStorage.getItem('backoffice_user'))?.phone;
  if (sessionPhone === '0944456396') {
    cardsHtml += '<div class="dir-card" onclick="window.location.href=\'admin.html\'" style="border:2px solid #c33;grid-column:1/-1"><h3 style="color:#c33">Admin Panel</h3><p>\u0e08\u0e31\u0e14\u0e01\u0e32\u0e23 Login / \u0e41\u0e01\u0e49\u0e44\u0e02\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25 / \u0e40\u0e1e\u0e34\u0e48\u0e21-\u0e25\u0e1a Contact</p></div>';
    cardsHtml += '<div class="dir-card" onclick="window.location.href=\'import.html\'" style="border:2px solid #f90;grid-column:1/-1"><h3 style="color:#f90">Import Data to Firebase</h3><p>\u0e19\u0e33\u0e40\u0e02\u0e49\u0e32\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e40\u0e14\u0e34\u0e21\u0e02\u0e36\u0e49\u0e19 Firestore (\u0e17\u0e33\u0e04\u0e23\u0e31\u0e49\u0e07\u0e41\u0e23\u0e01)</p></div>';
  }

  document.getElementById('dirCards').innerHTML = cardsHtml;
}

function goDir(dir, groupId, nickname) {
  var session = JSON.parse(sessionStorage.getItem('backoffice_user'));
  session.selectedDir = dir;
  session.nickname = nickname;
  session.matches = session.user.filter(function(u){return u.dir===dir});
  sessionStorage.setItem('backoffice_user', JSON.stringify(session));
  window.location.href = dir + '.html?group=' + groupId;
}

function doLogout() {
  sessionStorage.removeItem('backoffice_user');
  document.getElementById('menuPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('phoneInput').value = '';
  document.getElementById('phoneInput').focus();
}

// On load - check session
(function() {
  try {
    var s = sessionStorage.getItem('backoffice_user');
    if (s) {
      var data = JSON.parse(s);
      if (data && data.user && data.user.length > 0) {
        showMenu(data.user);
        return;
      }
    }
  } catch(e) {}
  // Default: show login
  sessionStorage.removeItem('backoffice_user');
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('menuPage').style.display = 'none';
})();
</script>
